name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            comments:
              - 'comments/**'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm test
      - run: npm run build --workspace=blog

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan arbiter.zkmarek.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy blog
        run: |
          rsync -avz --delete -e 'ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes' \
            blog/dist/ deploy@arbiter.zkmarek.com:/var/www/static/

      - name: Deploy blog content
        run: |
          rsync -avz --delete -e 'ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes' \
            blog/src/content/blog/ deploy@arbiter.zkmarek.com:/var/www/blog-content/

      - name: Deploy comments service
        if: steps.changes.outputs.comments == 'true'
        run: |
          rsync -avz --delete --exclude='data/' --exclude='.env' --exclude='node_modules/' \
            -e 'ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes' \
            comments/ deploy@arbiter.zkmarek.com:/var/www/comments/
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes deploy@arbiter.zkmarek.com \
            "cd /var/www/comments && npm install --omit=dev && sudo systemctl restart comments"
