<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0014"/>
      <stop offset="50%" style="stop-color:#0d0028"/>
      <stop offset="100%" style="stop-color:#05001a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="scanline">
      <feTurbulence type="fractalNoise" baseFrequency="0 1.5" numOctaves="1" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="bnoise"/>
      <feComponentTransfer in="bnoise" result="lines">
        <feFuncA type="discrete" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="lines" operator="over"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff00ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <radialGradient id="spotCyan" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotMagenta" cx="30%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient color spots -->
  <rect width="1200" height="630" fill="url(#spotMagenta)"/>
  <rect width="1200" height="630" fill="url(#spotCyan)"/>

  <!-- Perspective grid floor -->
  <g opacity="0.5">
    <g transform="translate(600,630) scale(1.8,0.6) translate(-600,-630)">
      <rect y="380" width="1200" height="250" fill="url(#grid)"/>
    </g>
    <!-- Grid fade -->
    <rect y="380" width="1200" height="30" fill="url(#bg)" opacity="0.8"/>
  </g>

  <!-- Horizontal glow lines -->
  <rect x="0" y="180" width="1200" height="1.5" fill="url(#glow1)" opacity="0.7"/>
  <rect x="0" y="440" width="1200" height="1" fill="url(#glow2)" opacity="0.5"/>
  <rect x="100" y="185" width="1000" height="0.5" fill="url(#glow1)" opacity="0.3"/>

  <!-- Floating particles -->
  <circle cx="150" cy="120" r="1.5" fill="#ff00ff" opacity="0.8"/>
  <circle cx="980" cy="90" r="1" fill="#00ffff" opacity="0.9"/>
  <circle cx="300" cy="500" r="1.2" fill="#00ffff" opacity="0.6"/>
  <circle cx="850" cy="480" r="1.8" fill="#ff00ff" opacity="0.5"/>
  <circle cx="500" cy="80" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="1050" cy="200" r="1" fill="#ff00ff" opacity="0.4"/>
  <circle cx="700" cy="550" r="1.5" fill="#00ffff" opacity="0.4"/>
  <circle cx="200" cy="350" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="1100" cy="400" r="1.2" fill="#ff00ff" opacity="0.3"/>
  <circle cx="80" cy="250" r="1" fill="#00ffff" opacity="0.5"/>

  <!-- Large diffused glow behind text -->
  <ellipse cx="600" cy="300" rx="350" ry="120" fill="#ff00ff" opacity="0.06" filter="url(#bigGlow)"/>
  <ellipse cx="600" cy="310" rx="300" ry="100" fill="#00ffff" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- Main title -->
  <text x="600" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-size="80" font-weight="700" fill="url(#titleGrad)" filter="url(#neon)" letter-spacing="8">HELLO</text>
  <text x="600" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="80" font-weight="700" fill="url(#titleGrad)" filter="url(#neon)" letter-spacing="8">WORLD</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00ffff" opacity="0.7" letter-spacing="12">// INITIALIZING NEW SYSTEM</text>

  <!-- Corner decorations -->
  <g stroke="#ff00ff" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1140,30 1170,30 1170,60"/>
    <polyline points="1170,570 1170,600 1140,600"/>
    <polyline points="60,600 30,600 30,570"/>
  </g>

  <!-- Status text decorations -->
  <text x="50" y="52" font-family="'Courier New', monospace" font-size="10" fill="#ff00ff" opacity="0.4">SYS.ONLINE</text>
  <text x="1150" y="52" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#00ffff" opacity="0.4">2024.01.01</text>
  <text x="50" y="590" font-family="'Courier New', monospace" font-size="10" fill="#00ffff" opacity="0.3">MAREK://KIREJCZYK</text>
  <text x="1150" y="590" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#ff00ff" opacity="0.3">BLOG.v1.0</text>

  <!-- Scanline overlay -->
  <rect width="1200" height="630" filter="url(#scanline)" opacity="0.4"/>
</svg>
